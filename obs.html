<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>噗妮KTV｜OBS</title>
  <style>
    :root{--muted:rgba(255,255,255,.75);--line:rgba(255,255,255,.15);}
    html,body{height:100%;margin:0;}
    body{background:transparent;color:#fff;font-family:sans-serif;}
    .wrap{padding:18px;}
    .title{font-size:34px;font-weight:1000;margin:0 0 12px 0;}
    .grid{display:grid;grid-template-columns:1.2fr .8fr;gap:14px;}
    .card{background:rgba(0,0,0,.45);border:1px solid var(--line);border-radius:16px;padding:14px;}
    .card h2{margin:0 0 10px 0;font-size:18px;font-weight:1000;color:var(--muted);}
    .now{font-size:38px;font-weight:1100;line-height:1.2;}
    .sub{margin-top:8px;font-size:18px;color:var(--muted);}
    .item{padding:10px 12px;border-radius:14px;border:1px solid var(--line);background:rgba(0,0,0,.28);margin:8px 0;}
    @media (max-width:980px){.grid{grid-template-columns:1fr}.now{font-size:32px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div id="header" class="title">🎤 噗妮KTV 播放清單</div>
    <div class="grid">
      <div class="card">
        <h2>Now Playing</h2>
        <div class="now" id="nowTitle">（尚無歌曲）</div>
        <div class="sub" id="nowArtist"></div>
      </div>
      <div class="card">
        <h2>Next Up</h2>
        <div id="nextList"></div>
        <div class="sub" id="syncText">同步中…</div>
      </div>
    </div>
  </div>

  <script src="common.js"></script>
  <script src="obs.js"></script>
</body>
</html>
