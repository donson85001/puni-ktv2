<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>噗妮KTV（觀眾）</title>
  <link rel="stylesheet" href="styles.css?v=audfix4" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo"><img src="cute.gif" alt="cute" /></div>
      <div>
        <div class="title">噗妮KTV（觀眾）</div>
        <div class="subtitle">歌單查詢版｜想點歌請直接到聊天室使用 <b>!點歌</b></div>
      </div>
    </div>
    <div class="subtitle">觀眾頁</div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <button class="nav active" data-page="queue">🎤 播放清單</button>
      <button class="nav" data-page="songs">🎵 歌單</button>
      <button class="nav" data-page="leaderboard">🏆 排行榜</button>
      <button class="nav" data-page="wish">💬 許願池</button>

      <div class="panel">
        <div class="panel-title">同步狀態</div>
        <div class="panel-body" id="syncStatus">尚未同步</div>
      </div>

      <div class="panel">
        <div class="panel-title">提醒</div>
        <div class="panel-body">想點歌請直接到聊天室輸入：<b>!點歌 歌名 / 歌手</b></div>
      </div>
    </aside>

    <section class="content">
      <div class="section-shell">
        <div class="page" id="page-queue">
          <div class="hero">
            <h2>今天歌單想聽哪首？</h2>
            <p>先看歌單，再到聊天室輸入 <b>!點歌 歌名 / 歌手</b>。</p>
          </div>

          <div class="stats-row">
            <div class="stat-card">
              <div class="stat-label">目前排隊歌曲</div>
              <div class="stat-value" id="statQueue">0</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">總歌曲數</div>
              <div class="stat-value" id="statSongs">0</div>
            </div>
            <div class="stat-card">
              <div class="stat-label">練習中歌曲</div>
              <div class="stat-value" id="statPractice">0</div>
            </div>
          </div>

          <div class="grid-2">
            <div class="card">
              <div class="card-h">💬 點歌方式</div>
              <div class="note-text">站內只提供查歌。想點歌請直接到聊天室使用 <b>!點歌</b>。</div>
            </div>
            <div class="card">
              <div class="card-h">🎤 目前播放清單</div>
              <div id="homeQueue" class="list scroll-list home-queue"></div>
            </div>
          </div>
        </div>

        <div class="page hidden" id="page-songs">
          <div class="hero">
            <h2>歌單</h2>
            <p>支援分類與關鍵字搜尋。</p>
          </div>

          <div class="toolbar">
            <div class="search">
              <input id="songSearch" placeholder="搜尋歌名 / 歌手 / 子標籤" />
              <button id="songSearchBtn" class="btn btn-primary">搜尋</button>
              <button id="toggleCats" class="btn">顯示 / 隱藏 分類</button>
            </div>
          </div>

          <div id="catPanel" class="card">
            <div class="panel-title simple">分類</div>
            <div id="mainCatChips" class="chip-grid"></div>
            <div id="catChips" class="chip-grid mt12"></div>
          </div>

          <div id="songGrid" class="song-grid"></div>
        </div>

        <div class="page hidden" id="page-leaderboard">
          <div class="hero">
            <h2>熱門排行榜</h2>
            <p>依播放次數排序。</p>
          </div>

          <div id="leaderboardList" class="song-grid"></div>
          <div id="leaderboardPager" class="pager"></div>
        </div>

        <div class="page hidden" id="page-wish">
          <div class="hero">
            <h2>許願池</h2>
            <p>不在歌單裡的歌，可以先丟進許願池給主播看。</p>
          </div>

          <div class="card">
            <div class="card-h">💗 新增許願</div>
            <form id="wishForm" class="wish-inline-form">
              <input id="wishSong" placeholder="輸入想許願的歌名" />
              <input id="wishUser" placeholder="你的名字 / 暱稱（可空白）" />
              <button class="btn btn-primary" type="submit">送出到許願池</button>
            </form>
            <div id="wishMsg" class="note-text mt12"></div>
          </div>

          <div class="card">
            <div class="card-h">📮 最近許願</div>
            <div id="wishList" class="list scroll-list"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="common.js?v=audfix4"></script>
  <script src="audience.js?v=audfix4"></script>
</body>
</html>
