<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>噗妮KTV（主播）</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .gate{min-height:100vh;display:grid;place-items:center;padding:18px;}
    .gate-card{width:min(520px,95vw);background:rgba(20,20,35,.75);border:1px solid rgba(145,70,255,.35);
      border-radius:18px;box-shadow:0 18px 40px rgba(0,0,0,.5);padding:18px;}
    .gate-row{display:flex;gap:8px}
    .gate-row input{flex:1;padding:12px;border-radius:14px;border:1px solid var(--line);background:rgba(10,10,18,.65);color:var(--text)}
  </style>
</head>
<body>

<div id="gate" class="gate">
  <div class="gate-card">
    <div class="title">主播登入</div>
    <div class="muted small" style="margin-top:6px;">密碼在後端驗證（前端不存密碼）</div>
    <div class="gate-row" style="margin-top:12px;">
      <input id="pw" placeholder="輸入密碼" />
      <button id="loginBtn" class="btn btn-primary">登入</button>
    </div>
    <div id="gateMsg" class="muted small" style="margin-top:10px;"></div>
  </div>
</div>

<div id="app" style="display:none">
  <header class="topbar">
    <div class="brand">
      <div class="logo">🎛️</div>
      <div>
        <div class="title">噗妮KTV（主播）</div>
        <div class="subtitle">點歌/排行榜點歌：直接進播放清單（Queue）</div>
      </div>
    </div>
    <div class="muted small">主播頁</div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <button class="nav active" data-page="queue">🎤 播放清單</button>
      <button class="nav" data-page="songs">🎵 點歌</button>
      <button class="nav" data-page="leaderboard">🏆 排行榜</button>
      <button class="nav" data-page="wishlist">💬 許願池</button>
      <button class="nav" data-page="obs">🟪 OBS</button>

      <div class="panel">
        <div class="panel-title">同步狀態</div>
        <div class="panel-body"><div class="muted small" id="syncStatus">尚未同步</div></div>
      </div>
    </aside>

    <section class="content">
      <div class="page" id="page-queue">
        <div class="card">
          <div class="card-h">🎤 播放清單（Queue）</div>
          <div id="queueList" class="list"></div>
        </div>
      </div>

      <div class="page hidden" id="page-songs">
        <div class="toolbar">
          <div class="search">
            <input id="songSearch" placeholder="搜尋歌名 / 歌手 / 子標籤（不分大小寫）" />
            <button id="songSearchBtn" class="btn btn-primary">搜尋</button>
          </div>
        </div>

        <div style="margin-bottom:12px;">
          <button id="toggleCats" class="btn">顯示/隱藏 分類</button>
          <div id="catPanel" class="panel" style="display:none;">
            <div class="panel-title">分類（點歌正下方）</div>
            <div class="panel-body" id="catChips"></div>
          </div>
        </div>

        <div id="songGrid" class="song-grid"></div>
      </div>

      <div class="page hidden" id="page-leaderboard">
        <div class="card">
          <div class="card-h">🏆 排行榜（樣式同點歌卡片）</div>
          <div id="leaderboardList" class="list"></div>
        </div>
      </div>

      <div class="page hidden" id="page-wishlist">
        <div class="card">
          <div class="card-h">💬 許願池（主播可刪除）</div>
          <div id="wishList" class="list"></div>
        </div>
      </div>

      <div class="page hidden" id="page-obs">
        <div class="card">
          <div class="card-h">🟪 OBS Browser Source（完整播放清單）</div>
          <div class="muted">
            <div class="mono" id="obsUrl"></div>
          </div>
        </div>
      </div>

      <footer class="footer muted small">主播頁｜同步：Queue 每 2 秒、歌曲每 25 秒</footer>
    </section>
  </main>
</div>

<script src="common.js"></script>
<script src="streamer.js"></script>
</body>
</html>
