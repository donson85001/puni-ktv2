<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>噗妮KTV｜觀眾</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header>噗妮KTV - 觀眾</header>
<div class="container">
  <h2>點歌</h2>
  <div id="songs"></div>

  <h2>播放清單（僅顯示）</h2>
  <div id="queuePreview"></div>

  <h2>排行榜（可點歌）</h2>
  <div id="leader"></div>

  <h2>許願池</h2>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <input id="wname" placeholder="許願者（暱稱）">
    <input id="wsong" placeholder="歌名 / 版本 / 歌手">
    <button onclick="wish()">送出</button>
  </div>
  <h3>許願列表（只顯示歌名）</h3>
  <div id="wishPreview"></div>
</div>

<script src="common.js"></script>
<script src="audience.js"></script>
</body>
</html>
